name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/src/index.js || (echo "dist/src/index.js missing" && exit 1)
          test -f dist/src/http-server.js || (echo "dist/src/http-server.js missing" && exit 1)
